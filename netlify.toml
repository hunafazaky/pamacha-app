[build]
  # Menggunakan pnpm untuk menjalankan generate (membuat static site Nuxt)
  command = "pnpm install && pnpm run generate"
  
  # Direktori output standar dari Nuxt generate
  publish = "dist"

[build.environment]
  # Menerapkan bypass OpenSSL persis seperti yang kamu lakukan di lokal
  NODE_OPTIONS = "--openssl-legacy-provider"
  
  # Mengunci versi Node.js di Netlify agar konsisten (rekomendasi: 18 atau 20)
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"